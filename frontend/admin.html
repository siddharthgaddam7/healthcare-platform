<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Hyderabad Health</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific admin styles that align with clinical premium tokens */
        body {
            background-color: #ffffff;
        }

        .page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .header-section {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
        }

        .header-section h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-section p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .stat-card .label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .table-container {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #f1f1f1;
            color: var(--text-primary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .btn-view {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .btn-view:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>

<body>
    <nav class="topnav">
        <div class="topnav-left">
            <span class="nav-icon">&#x2665;</span>
            <span class="nav-title">Hyderabad Health</span>
            <span
                style="font-size: 0.7rem; background: var(--bg-secondary); padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600;">ADMIN</span>
        </div>
        <button class="nav-logout-btn" onclick="doLogout()">Sign Out</button>
    </nav>

    <div class="page">
        <div class="header-section">
            <h1>Administrative Dashboard</h1>
            <p>Analytical overview of user activity and platform utilization.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Registered Users</div>
                <div class="value" id="statUsers">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Cumulative Procedures</div>
                <div class="value" id="statItems">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Gross Transaction Value</div>
                <div class="value" id="statValue">-</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User Identity</th>
                        <th>Registration Date</th>
                        <th>Items</th>
                        <th>Total Value</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr>
                        <td colspan="6" style="padding: 2rem; text-align: center; color: var(--text-secondary);">
                            Initializing data synchronization...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const B = "http://15.206.125.164:10000";
        fetch(B + "/me", { credentials: "include" })
            .then(r => r.json())
            .then(d => { if (d.role !== "admin") window.location.href = "login.html"; })
            .catch(() => window.location.href = "login.html");

        async function load() {
            try {
                const r = await fetch(B + "/admin/users", { credentials: "include" });
                const data = await r.json();
                const users = data.users || [];

                document.getElementById("statUsers").textContent = users.length;
                document.getElementById("statItems").textContent = users.reduce((s, u) => s + u.cart_count, 0);
                document.getElementById("statValue").innerHTML = "&#8377;" + users.reduce((s, u) => s + u.cart_total, 0).toLocaleString();

                const tbody = document.getElementById("tbody");
                tbody.innerHTML = users.map((u, i) => `
                    <tr>
                        <td>${u.id}</td>
                        <td style="font-weight: 500;">${u.username}</td>
                        <td>${u.joined ? u.joined.slice(0, 10) : '-'}</td>
                        <td>${u.cart_count}</td>
                        <td>&#8377;${u.cart_total.toLocaleString()}</td>
                        <td>
                            <button class="btn-view" onclick="toggleDetails(${u.id})">Details</button>
                        </td>
                    </tr>
                `).join("");

            } catch (e) { console.error(e); }
        }
        function doLogout() { fetch(B + "/logout", { method: "POST", credentials: "include" }).then(() => window.location.href = "login.html"); }
        load();
    </script>
</body>

</html>
