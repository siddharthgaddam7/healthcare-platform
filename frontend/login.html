<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hyderabad Health</title>
    <style>
        :root {
            --bg-base: #ffffff;
            --bg-secondary: #f5f6f7;
            --text-primary: #1c1c1e;
            --text-secondary: #6e6e73;
            --accent: #3a6ea5;
            --border: #e5e5e5;
            --radius: 6px;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .logo {
            margin-bottom: 2rem;
        }

        .logo-icon {
            color: var(--accent);
            font-size: 1.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .logo h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--accent);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .msg {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            padding: 0.75rem;
            border-radius: 4px;
            display: none;
        }

        .msg.error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fee2e2;
            display: block;
        }

        .msg.success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #dcfce7;
            display: block;
        }

        #registerPanel {
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">
            <span class="logo-icon">&#x2665;</span>
            <h1>Hyderabad Health</h1>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
            <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
        </div>
        <div id="loginPanel">
            <div class="form-group"><label>Username</label><input type="text" id="loginUser"></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPass"></div>
            <button class="submit-btn" onclick="doLogin()">Sign In</button>
            <div class="msg" id="loginMsg"></div>
        </div>
        <div id="registerPanel">
            <div class="form-group"><label>Username</label><input type="text" id="regUser"></div>
            <div class="form-group"><label>Password</label><input type="password" id="regPass"></div>
            <div class="form-group"><label>Confirm</label><input type="password" id="regPass2"></div>
            <button class="submit-btn" onclick="doRegister()">Create Account</button>
            <div class="msg" id="registerMsg"></div>
        </div>
    </div>
    <script>
        const BASE = '';
        function showTab(tab) {
            document.getElementById('loginPanel').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerPanel').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
        }
        function showMsg(id, t, type) { const el = document.getElementById(id); el.textContent = t; el.className = 'msg ' + type; }

        async function doLogin() {
            const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value;
            try {
                const r = await fetch(BASE + '/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ username: u, password: p }) });
                const d = await r.json();
                if (!r.ok) { showMsg('loginMsg', d.error || 'Login failed', 'error'); return; }
                window.location.href = d.role === 'admin' ? 'admin.html' : 'index.html';
            } catch (e) { showMsg('loginMsg', 'Server error', 'error'); }
        }

        async function doRegister() {
            const u = document.getElementById('regUser').value, p = document.getElementById('regPass').value, c = document.getElementById('regPass2').value;
            if (p !== c) { showMsg('registerMsg', 'Passwords mismatch', 'error'); return; }
            try {
                const r = await fetch(BASE + '/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ username: u, password: p }) });
                const d = await r.json();
                if (!r.ok) { showMsg('registerMsg', d.error || 'Failed', 'error'); return; }
                window.location.href = 'index.html';
            } catch (e) { showMsg('registerMsg', 'Server error', 'error'); }
        }
    </script>
</body>

</html>
